production:
  dispatchers:
    - polling_interval: 5
      batch_size: 500
      concurrency_maintenance_interval: 300
  workers:
    - queues: [monitors]
      threads: 2
      priority: 1
    - queues: [notifications]  
      threads: 3
      priority: 3
    - queues: [default]
      threads: 1
      priority: 5

development:
  dispatchers:
    - polling_interval: 10
      batch_size: 100
      concurrency_maintenance_interval: 600
  workers:
    - queues: [monitors, notifications, default]
      threads: 3

test:
  dispatchers:
    - polling_interval: 1
      batch_size: 10
      concurrency_maintenance_interval: 60
  workers:
    - queues: [monitors, notifications, default]
      threads: 1